            osc.type = "square";
            osc.frequency.value = 1100;
            const g = audioCtx.createGain();
            g.gain.setValueAtTime(0.15, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(t); osc.stop(t + 0.1);
          }, 600);
        } else if (!reversing && _wasReversing) {
          clearInterval(_reverseBeepTimer);
          _reverseBeepTimer = null;
        }
        _wasReversing = reversing;
      }

      // Track sound trigger states

      function updateSounds() {
        if (!audioUnlocked) return;
        const speed = state.speed;
        const isReverse = speed < 0;
        updateEngineSound(speed, isReverse);
        updateReverseBeep(speed);

        // Brake hiss — on fresh press only
        if (keys.Space && !_prevBrakeKey && Math.abs(speed) > 2) playBrake();
        _prevBrakeKey = keys.Space;

        // Collision — once per collision
        if (state.collision && !_soundCollision) { playCollision(); _soundCollision = true; }
        if (!state.collision) _soundCollision = false;

        // Jackknife — once per jackknife
        if (state.jackknife && !_soundJackknife) { playJackknife(); _soundJackknife = true; }
        if (!state.jackknife) _soundJackknife = false;

        // Warning beep — single beep when approaching jackknife
        if (state.jacknifeBeep && !state.jackknife && !_soundJacknifeWarn) {
          playJacknifeWarn(); _soundJacknifeWarn = true;
        }
        if (!state.jacknifeBeep) _soundJacknifeWarn = false;

        // Dock — once per docking
        if (state.docked && !_soundDocked) { playDock(); _soundDocked = true; }
        if (!state.docked) _soundDocked = false;
      }

      // Reset sound states on game reset
      function playJacknifeWarn() {
        if (!audioCtx || !audioUnlocked) return;
        try {
          const t = audioCtx.currentTime;
          const osc = audioCtx.createOscillator();
          osc.type = "square";
          osc.frequency.value = 660;
          const g = audioCtx.createGain();
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(0.25, t + 0.02);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
          osc.connect(g); g.connect(audioCtx.destination);
          osc.start(t); osc.stop(t + 0.2);
        } catch(e) {}
      }

      function resetSounds() {
        _soundCollision    = false;
        _soundJackknife    = false;
        _soundJacknifeWarn = false;
        _soundDocked       = false;
        _wasReversing      = false;
        _wasReversing   = false;
        if (_reverseBeepTimer) { clearInterval(_reverseBeepTimer); _reverseBeepTimer = null; }
      }
      /* =====================================
         MAIN LOOP
      ===================================== */
      let lastTime = performance.now();

      function loop(ts = performance.now()) {
        const dt = Math.min(1 / 30, (ts - lastTime) / 1000);
        lastTime = ts;

        update(dt);
        updateSounds();

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const viewW = canvas.width;
        const viewH = canvas.height;

        // Smooth-follow camera
        const targetX = state.x - Math.cos(state.heading) * CHASE_DISTANCE;
        const targetY = state.y - Math.sin(state.heading) * CHASE_DISTANCE;
        camera.x += (targetX - camera.x) * 0.08;
        camera.y += (targetY - camera.y) * 0.08;

        ctx.save();
        ctx.translate(viewW / 2, viewH * 0.75);
        ctx.rotate(-state.heading - Math.PI / 2);
        ctx.scale(camera.zoom, camera.zoom);
        ctx.translate(-camera.x, -camera.y);

        drawBackground();
        drawYardSurfaces();
        drawBuildings();
        drawObstacles();
        drawTruck();
        drawTrailer();

        ctx.restore();

        drawHUD();
        drawMirror(mctxL, -1);
        drawMirror(mctxR,  1);

        requestAnimationFrame(loop);
      }

      /* =====================================
         LEADERBOARD
      ===================================== */
      const LB_BIN_ID  = "6a21adddf5f4af5e29b9400c";
      const LB_API_KEY = "$2a$10$OMGkaEzP9g54Nv/pOu7L..fq/NWm1TBKGTMLn6pzEmbIn1M6AUL4y";
      const LB_URL     = `https://api.jsonbin.io/v3/b/${LB_BIN_ID}`;

      const lbOverlay  = document.getElementById("leaderboard-overlay");
      const lbBody     = document.getElementById("lb-body");
      const nameInput  = document.getElementById("name-input");
      const saveBtn    = document.getElementById("save-score-btn");
      const closeLbBtn = document.getElementById("close-lb-btn");
      const lbBtn      = document.getElementById("lb-btn");

      let lbEntries = [];

      function renderLeaderboard() {
        lbBody.innerHTML = "";
        const sorted = [...lbEntries].sort((a, b) => b.score - a.score).slice(0, 10);
        if (sorted.length === 0) {
          lbBody.innerHTML = `<tr><td colspan="4" style="text-align:center;color:#666;padding:12px">No entries yet — be the first!</td></tr>`;
          return;
        }
        sorted.forEach((e, i) => {
          const medal = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : `${i + 1}`;
          const tr = document.createElement("tr");
          tr.innerHTML = `<td style="text-align:center">${medal}</td><td>${e.name}</td><td style="text-align:right">${Number(e.score).toFixed(1)}</td><td style="text-align:right;color:#888">${e.date}</td>`;
          lbBody.appendChild(tr);
        });
      }

      async function fetchLeaderboard() {
        lbBody.innerHTML = `<tr><td colspan="4" style="text-align:center;color:#666;padding:12px">Loading...</td></tr>`;
        try {
          const res  = await fetch(LB_URL + "/latest", {
            headers: { "X-Master-Key": LB_API_KEY }
          });
          const data = await res.json();
          lbEntries  = (data.record.scores || []).filter(e => e.score > 0);
          renderLeaderboard();
        } catch(e) {
          lbBody.innerHTML = `<tr><td colspan="4" style="text-align:center;color:#e44;padding:12px">Failed to load</td></tr>`;
        }
      }

      async function pushLeaderboard() {
        try {
          await fetch(LB_URL, {
            method:  "PUT",
            headers: {
              "Content-Type": "application/json",
              "X-Master-Key": LB_API_KEY,
            },
            body: JSON.stringify({ scores: lbEntries }),
          });
        } catch(e) {
          console.warn("Failed to save leaderboard:", e);
        }
      }

      function openLeaderboard() {
        lbOverlay.classList.add("show");
        fetchLeaderboard();
        // Pre-fill last used name from localStorage
        const lastName = localStorage.getItem("truckSim_name") || "";
        if (lastName) nameInput.value = lastName;
      }

      saveBtn.addEventListener("click", async () => {
        const name  = nameInput.value.trim() || "Anonymous";
        const score = state.score;
        const date  = new Date().toLocaleDateString();
        // Save name for next time
        try { localStorage.setItem("truckSim_name", name); } catch(e) {}
        // Re-fetch first to get latest
        try {
          const res  = await fetch(LB_URL + "/latest", {
            headers: { "X-Master-Key": LB_API_KEY }
          });
          const data = await res.json();
          lbEntries  = (data.record.scores || []).filter(e => e.score > 0);
        } catch(e) {}
        lbEntries.push({ name, score, date });
        lbEntries.sort((a, b) => b.score - a.score);
        lbEntries.splice(10);
        await pushLeaderboard();
        renderLeaderboard();
      });

      closeLbBtn.addEventListener("click", () => lbOverlay.classList.remove("show"));
      lbBtn.addEventListener("click", openLeaderboard);
      lbOverlay.addEventListener("touchstart", (e) => e.stopPropagation());
      nameInput.addEventListener("keydown", (e) => e.stopPropagation());

      reset();
      camera.x = state.x;
      camera.y = state.y;
      requestAnimationFrame(loop);
    </script>
  </body>
